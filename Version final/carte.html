    header {

      padding: 1rem;
      text-align: center;
    }

    main {
      display: flex;
      height: calc(100% - 60px);

    #sidebar {
      width: 300px;
      padding: 1rem;
      background: #f8f9fa;
      overflow-y: auto;
      border-right: 1px solid #dee2e6;

    #map {

    }

    select, input {
      width: 100%;
      padding: 0.5rem;

    .leaflet-routing-container {

        <option value="public">Public</option>

      <label for="searchInput">Recherche par nom:</label>

    let userLocation = null;
    const map = L.map('map').setView([16.25, -61.53], 10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const markers = [];
    let routingControl = null;

    function displayMarkers() {
      markers.forEach(marker => map.removeLayer(marker));
      markers.length = 0;

      const selectedType = document.getElementById('typeSelect').value;
      const selectedCategory = document.getElementById('categorySelect').value;
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();

      lycees.forEach(lycee => {
        if ((selectedType === 'all' || lycee.type === selectedType) &&
            (selectedCategory === 'all' || lycee.categorie === selectedCategory) &&
            (lycee.nom.toLowerCase().includes(searchTerm))) {
          const marker = L.marker([lycee.lat, lycee.lon]).addTo(map)
            .bindPopup(`<b>${lycee.nom}</b><br><a href="${lycee.url}" target="_blank">Voir les détails</a><br><button onclick="createRoute(${lycee.lat}, ${lycee.lon})">Itinéraire</button>`);
          markers.push(marker);
        }
      });
    }

    function createRoute(destLat, destLon) {
      if (!userLocation) {
        alert("Veuillez d'abord activer la géolocalisation.");
        return;
      }

      if (routingControl) {
        map.removeControl(routingControl);
      }

      routingControl = L.Routing.control({
        waypoints: [
          L.latLng(userLocation.lat, userLocation.lng),
          L.latLng(destLat, destLon)
        ],
        routeWhileDragging: false
      }).addTo(map);
    }

    function geolocate() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(position => {
          userLocation = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };
          L.marker(userLocation).addTo(map)
            .bindPopup("Vous êtes ici").openPopup();
          map.setView(userLocation, 12);
        }, () => {
          alert("Géolocalisation échouée.");
        });
      } else {
        alert("Votre navigateur ne supporte pas la géolocalisation.");
      }
    }

    document.getElementById('typeSelect').addEventListener('change', displayMarkers);
    document.getElementById('categorySelect').addEventListener('change', displayMarkers);
    document.getElementById('searchInput').addEventListener('input', displayMarkers);
